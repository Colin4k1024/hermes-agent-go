services:
  postgres:
    image: postgres:16
    container_name: hermes-pg
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: hermes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hermes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hermes
      MINIO_ROOT_PASSWORD: hermespass
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  hermes-saas:
    build:
      context: .
      dockerfile: Dockerfile.saas
    container_name: hermes-saas
    command: ["saas-api"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Storage
      DATABASE_URL: postgres://hermes:hermes@postgres:5432/hermes?sslmode=disable
      REDIS_URL: redis://redis:6379
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: hermes
      MINIO_SECRET_KEY: hermespass
      MINIO_BUCKET: hermes-skills
      # SaaS API
      SAAS_API_PORT: "8080"
      SAAS_ALLOWED_ORIGINS: "*"
      SAAS_STATIC_DIR: /static
      HERMES_ACP_TOKEN: dev-token-change-in-production
      # Gateway runner adapter (full agent path)
      HERMES_API_KEY: test-secret-key
      HERMES_API_PORT: "8081"
      # LLM config — mockchat path (direct HTTP)
      LLM_API_URL: http://host.docker.internal:11434
      LLM_API_KEY: ollama
      LLM_MODEL: qwen3:30b
      # LLM config — AIAgent path (gateway runner)
      HERMES_MODEL: qwen3:30b
      HERMES_PROVIDER: openai
      HERMES_BASE_URL: http://host.docker.internal:11434/v1
      HERMES_API_KEY_LLM: ollama
      HERMES_API_MODE: openai
      # Debug
      HERMES_DEBUG: "true"
    volumes:
      - ./skills:/home/hermes/skills:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "18080:8080"
      - "18081:8081"

volumes:
  postgres_data:
  redis_data:
  minio_data:
